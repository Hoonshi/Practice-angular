<div class="min-h-screen bg-white flex">
  <!-- 왼쪽: 목록 -->
  <div class="w-1/2 px-4 py-10">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-black">내 할 일</h1>
        <p class="text-sm text-gray-500 mt-4">
          {{ (todos$ | async)?.length }}개의 항목
        </p>
      </div>
      <button
        (click)="onAdd()"
        class="px-4 py-2.5 rounded-xl bg-black text-white text-sm font-semibold hover:bg-gray-800 transition"
      >
        + 추가
      </button>
    </div>

    <div *ngIf="(todos$ | async)?.length === 0" class="text-center py-16">
      <p class="text-gray-400 text-sm">할 일이 없습니다. 추가해 보세요!</p>
    </div>

    <ul class="space-y-3">
      <li
        *ngFor="let todo of todos$ | async; trackBy: trackById"
        class="bg-white rounded-2xl border border-gray-200 px-5 py-4 flex items-center gap-4 hover:border-gray-300 transition"
      >
        <button
          (click)="onToggle(todo.id)"
          [class]="
            todo.isCompleted
              ? 'w-6 h-6 rounded-full bg-black flex items-center justify-center flex-shrink-0 text-white text-xs transition'
              : 'w-6 h-6 rounded-full border-2 border-gray-300 flex-shrink-0 hover:border-black transition'
          "
        >
          <span *ngIf="todo.isCompleted" class="text-white">완</span>
        </button>

        <span class="text-sm px-2 py-0.5 text-gray-500">
          {{
            todo.priority === "urgent"
              ? "긴급"
              : todo.priority === "normal"
                ? "보통"
                : "낮음"
          }}
        </span>

        <span
          [class]="
            todo.isCompleted
              ? 'flex-1 text-sm text-gray-400 line-through'
              : 'flex-1 text-sm text-black font-medium'
          "
          >{{ todo.title }}
        </span>

        <a
          [routerLink]="['/todo', todo.id]"
          class="p-1.5 text-gray-400 text-sm border border-gray-200 rounded-full hover:text-black hover:bg-gray-100 transition"
        >
          상세
        </a>
        <button
          (click)="onDelete(todo.id)"
          class="p-1.5 text-gray-400 text-sm border border-gray-200 rounded-full hover:text-black hover:bg-gray-100 transition"
        >
          삭제
        </button>
      </li>
    </ul>
  </div>

  <!-- 오른쪽: 상세 -->
  <div class="w-1/2 border-l border-gray-200 px-4 py-10">
    <router-outlet />
  </div>
</div>
