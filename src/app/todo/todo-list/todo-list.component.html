<div>
  <!-- 추가 버튼 -->
  <button (click)="onAdd()">Todo 추가</button>

  <!-- 목록 -->
  <ul>
    <li *ngFor="let todo of todos">
      {{ todo.title }}
      <button (click)="onToggle(todo.id)">완료</button>
      <button (click)="onDelete(todo.id)">삭제</button>
      <a [routerLink]="['/todo', todo.id]">상세보기</a>
    </li>
  </ul>
</div>
