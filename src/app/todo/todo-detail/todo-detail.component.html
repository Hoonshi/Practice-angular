<div class="min-h-screen bg-white">
  <div class="max-w-xl mx-auto px-4 py-10">

    <a
      routerLink="/todo"
      class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-black mb-6 transition"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
      목록으로
    </a>

    <!-- View mode -->
    <div *ngIf="todo && !isEditMode" class="bg-white rounded-2xl border border-gray-200 p-8">

      <div class="flex items-center gap-2 mb-5">
        <span class="text-xs px-2.5 py-1 rounded-full border border-gray-200 text-gray-500">
          {{ todo.priority === 'urgent' ? '긴급' : todo.priority === 'normal' ? '보통' : '낮음' }}
        </span>
        <span
          [class]="todo.isCompleted
            ? 'text-xs px-2.5 py-1 rounded-full bg-black text-white'
            : 'text-xs px-2.5 py-1 rounded-full border border-gray-200 text-gray-500'"
        >
          {{ todo.isCompleted ? '완료' : '미완료' }}
        </span>
      </div>

      <h2
        [class]="todo.isCompleted
          ? 'text-xl font-bold text-gray-400 line-through mb-3'
          : 'text-xl font-bold text-black mb-3'"
      >{{ todo.title }}</h2>

      <p class="text-sm text-gray-600 leading-relaxed mb-6">{{ todo.content }}</p>

      <div *ngIf="todo.isCompleted && todo.completedAt" class="text-xs text-gray-400 mb-6">
        완료일: {{ todo.completedAt | date:'yyyy.MM.dd' }}
      </div>

      <button
        (click)="onEdit()"
        class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-black text-white text-sm font-semibold
               hover:bg-gray-800 transition"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
        </svg>
        수정
      </button>
    </div>

    <!-- Edit mode -->
    <div *ngIf="isEditMode" class="bg-white rounded-2xl border border-gray-200 p-8">
      <h2 class="text-lg font-bold text-black mb-6">할 일 수정</h2>

      <form [formGroup]="todoForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-black mb-1.5">제목</label>
          <input
            formControlName="title"
            placeholder="제목을 입력하세요"
            class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-black placeholder-gray-400
                   focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-black mb-1.5">내용</label>
          <input
            formControlName="content"
            placeholder="내용을 입력하세요"
            class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-black placeholder-gray-400
                   focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-black mb-1.5">우선순위</label>
          <select
            formControlName="priority"
            class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-black bg-white
                   focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition"
          >
            <option value="urgent">긴급</option>
            <option value="normal">보통</option>
            <option value="low">낮음</option>
          </select>
        </div>

        <div class="flex gap-3 pt-1">
          <button
            type="submit"
            [disabled]="todoForm.invalid"
            class="flex-1 py-2.5 px-4 rounded-xl bg-black text-white text-sm font-semibold
                   hover:bg-gray-800 disabled:opacity-30 disabled:cursor-not-allowed transition"
          >
            저장
          </button>
          <button
            type="button"
            (click)="onCancel()"
            class="flex-1 py-2.5 px-4 rounded-xl border border-gray-200 text-black text-sm font-semibold
                   hover:bg-gray-50 transition"
          >
            취소
          </button>
        </div>
      </form>
    </div>

  </div>
</div>
