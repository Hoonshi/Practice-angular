<div class="min-h-screen flex items-center justify-center bg-white">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-black">Angular Todo App</h1>
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 p-8">
      <form [formGroup]="signupForm" (submit)="onSubmit()" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-black mb-1.5">이메일</label>
          <input
            type="email"
            formControlName="email"
            placeholder="example@email.com"
            class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-black placeholder-gray-400 text-sm
                   focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-black mb-1.5">비밀번호</label>
          <input
            type="password"
            formControlName="password"
            placeholder="8자 이상 입력하세요"
            class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-black placeholder-gray-400 text-sm
                   focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition"
          />
        </div>
        <button
          type="submit"
          [disabled]="signupForm.invalid"
          class="w-full py-2.5 px-4 rounded-xl bg-black text-white text-sm font-semibold
                 hover:bg-gray-800 disabled:opacity-30 disabled:cursor-not-allowed transition"
        >
          회원가입
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-gray-500 mt-5">
      이미 계정이 있으신가요?
      <a routerLink="/login" class="text-black font-medium hover:underline">로그인</a>
    </p>
  </div>
</div>
